<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37회 정기연주회 파트별 악보 배정 현황</title>
    <!-- Pretendard Web Font for clean Korean typography -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-bg: #131b2e;
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-border: rgba(255, 255, 255, 0.06);
            --card-hover-border: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --accent-bg-glow: rgba(99, 102, 241, 0.15);
            
            --emerald-color: #10b981;
            --emerald-bg: rgba(16, 185, 129, 0.12);
            --emerald-border: rgba(16, 185, 129, 0.25);
            
            --rose-color: #f43f5e;
            --rose-bg: rgba(244, 63, 94, 0.1);
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px -2px rgba(0, 0, 0, 0.3), 0 2px 6px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 12px 24px -4px rgba(0, 0, 0, 0.4), 0 4px 12px -3px rgba(0, 0, 0, 0.3);
            
            --font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-bottom: 5rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        /* Header section styling */
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 1rem;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #c7d2fe;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .logo-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #818cf8;
            border-radius: 50%;
            box-shadow: 0 0 8px #818cf8;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Statistics Dashboard Cards */
        /* Statistics Dashboard Cards */
        .stats-toggle-wrapper {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .stats-toggle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            padding: 0.45rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            user-select: none;
            outline: none;
        }

        .stats-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .stats-toggle-btn .arrow-icon {
            transition: transform 0.25s ease;
        }

        .stats-toggle-btn.active .arrow-icon {
            transform: rotate(180deg);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 0;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, margin-bottom 0.3s ease;
            pointer-events: none;
        }

        .stats-container.expanded {
            max-height: 1000px;
            opacity: 1;
            margin-bottom: 2rem;
            pointer-events: auto;
        }

        .stats-card {
            background-color: var(--surface-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--accent-color);
        }

        .stats-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
        }

        .stat-item-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .stat-item-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Piece Status Panel */
        .pieces-stats-card {
            grid-column: span 2;
        }

        @media (max-width: 900px) {
            .pieces-stats-card {
                grid-column: span 1;
            }
        }

        .pieces-progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .piece-progress-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            padding: 0.6rem 0.75rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .piece-progress-item:hover {
            background: rgba(99, 102, 241, 0.06);
            border-color: rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }

        .piece-progress-item.active {
            background: var(--accent-bg-glow);
            border-color: var(--accent-color);
        }

        .piece-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            margin-bottom: 0.35rem;
        }

        .piece-progress-name {
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .piece-progress-count {
            font-weight: 700;
            color: var(--emerald-color);
            font-size: 0.75rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), var(--emerald-color));
            border-radius: 9999px;
            transition: width 0.5s ease-out;
        }

        /* Filter Controls */
        .controls-card {
            background-color: var(--surface-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
        }

        .search-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .search-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-bg-glow);
        }

        .search-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--text-dim);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .clear-btn {
            position: absolute;
            right: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            display: none;
            font-size: 0.9rem;
            padding: 0.2rem;
            transition: var(--transition-smooth);
        }

        .clear-btn:hover {
            color: var(--text-main);
        }

        .view-toggle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-smooth);
        }

        .view-toggle-btn:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-bg-glow);
        }

        /* Filter Tags - Instruments */
        .filter-section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-reset-link {
            font-size: 0.75rem;
            color: var(--accent-color);
            text-transform: none;
            letter-spacing: normal;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .filter-reset-link:hover {
            text-decoration: underline;
        }

        .instrument-tags {
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
            -webkit-overflow-scrolling: touch;
        }

        .instrument-tags::-webkit-scrollbar {
            height: 4px;
        }
        .instrument-tags::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .tag-pill {
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            white-space: nowrap;
            transition: var(--transition-smooth);
        }

        .tag-pill:hover {
            background-color: rgba(255, 255, 255, 0.07);
            color: var(--text-main);
        }

        .tag-pill.active {
            background-color: var(--active-bg, var(--accent-color));
            color: #ffffff;
            border-color: var(--active-border, var(--accent-color));
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* Score filters (checkbox-like tags) */
        .score-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .score-filter-chip {
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: var(--transition-smooth);
        }

        .score-filter-chip:hover {
            background-color: rgba(255, 255, 255, 0.07);
            color: var(--text-main);
        }

        .score-filter-chip.active {
            background-color: var(--emerald-bg);
            border-color: var(--emerald-border);
            color: var(--emerald-color);
        }

        .score-filter-chip.active::before {
            content: '✓';
            font-weight: 800;
        }

        /* Results Counter */
        .results-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 0 0.25rem;
        }

        .results-count span {
            font-weight: 700;
            color: var(--accent-color);
        }

        /* List Layout: Card View (Default on Mobile) */
        .list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 480px) {
            .list-container {
                grid-template-columns: 1fr;
            }
        }

        .member-card {
            background-color: var(--surface-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: var(--shadow-md);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .member-card:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .member-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .instrument-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 0.35rem;
            text-transform: uppercase;
        }

        .card-meta-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.25rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        .gisu-badge {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-color);
            background-color: var(--accent-bg-glow);
            padding: 0.15rem 0.45rem;
            border-radius: 0.35rem;
            display: inline-block;
        }

        .grade-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Batch check buttons inside Card */
        .batch-actions {
            display: inline-flex;
            gap: 0.25rem;
            margin-left: auto;
        }

        .batch-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.35rem;
            padding: 0.2rem 0.45rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-smooth);
            user-select: none;
        }

        .batch-btn:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.08);
        }

        .batch-btn.dist:hover {
            background-color: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.2);
            color: var(--emerald-color);
        }

        .batch-btn.recv:hover {
            background-color: var(--emerald-bg);
            border-color: var(--emerald-border);
            color: var(--emerald-color);
        }

        .batch-btn.reset:hover {
            background-color: rgba(244, 63, 94, 0.1);
            border-color: rgba(244, 63, 94, 0.2);
            color: var(--rose-color);
        }

        .card-pieces {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
        }

        .card-piece-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            padding: 0.25rem;
            border-radius: 0.25rem;
        }

        .card-piece-item.assigned {
            color: var(--text-main);
            font-weight: 500;
        }

        .card-piece-item.unassigned {
            color: var(--text-dim);
            text-decoration: line-through;
            opacity: 0.4;
        }

        .indicator-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .indicator-dot.active {
            background-color: var(--emerald-color);
            box-shadow: 0 0 6px var(--emerald-color);
        }

        .indicator-dot.inactive {
            background-color: var(--text-dim);
        }

        /* List Layout: Table View (Scroll Matrix) */
        .table-wrapper {
            background-color: var(--surface-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            overflow-x: auto;
            box-shadow: var(--shadow-md);
            display: none; /* Block when layout is table */
            max-height: 70vh;
            scrollbar-width: thin;
        }

        .matrix-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.85rem;
            text-align: left;
        }

        .matrix-table th, 
        .matrix-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        .matrix-table th {
            background-color: #101726;
            color: var(--text-muted);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        /* Sticky Columns in Table View for scrolling */
        .matrix-table th.sticky-name,
        .matrix-table td.sticky-name {
            position: sticky;
            left: 0;
            background-color: #131b2e;
            z-index: 10;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .matrix-table th.sticky-inst,
        .matrix-table td.sticky-inst {
            position: sticky;
            left: 75px; /* Adjust according to name width */
            background-color: #131b2e;
            z-index: 10;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 3px 0 5px -2px rgba(0,0,0,0.3);
        }

        .matrix-table th.sticky-name,
        .matrix-table th.sticky-inst {
            background-color: #101726;
            z-index: 25;
        }

        .matrix-table tbody tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .matrix-table tbody tr:hover td.sticky-name,
        .matrix-table tbody tr:hover td.sticky-inst {
            background-color: #19223a;
        }

        .table-assigned {
            color: var(--emerald-color);
            font-weight: 800;
            text-align: center;
        }

        .table-assigned-pill {
            background-color: var(--emerald-bg);
            border: 1px solid var(--emerald-border);
            color: var(--emerald-color);
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            display: inline-block;
        }

        .table-unassigned {
            color: var(--text-dim);
            text-align: center;
            opacity: 0.25;
        }

        /* View State Toggle styles for active layout */
        body.layout-table .table-wrapper {
            display: block;
        }

        body.layout-table .list-container {
            display: none;
        }

        body.layout-card .table-wrapper {
            display: none;
        }

        body.layout-card .list-container {
            display: grid;
        }

        /* Copy Dialog Alert / Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--accent-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* SVG icons */
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            stroke-width: 0;
            stroke: currentColor;
            fill: currentColor;
            vertical-align: middle;
        }

        /* Dynamic check styling */
        .piece-check-group {
            display: inline-flex;
            gap: 0.25rem;
            margin-left: auto;
        }

        .check-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            cursor: pointer;
            padding: 0.15rem 0.35rem;
            border-radius: 0.25rem;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
            transition: var(--transition-smooth);
            user-select: none;
            line-height: 1;
        }

        .check-label:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
        }

        .check-label input {
            display: none;
        }

        .check-label.dist-label.checked {

    <script>
        // Design colors map for instrument tags/badges
        const instrumentMeta = {
            '1Vn': { label: '1st Violin', color: '#ff4b72', bg: 'rgba(255, 75, 114, 0.12)', border: 'rgba(255, 75, 114, 0.25)' },
            '2Vn': { label: '2nd Violin', color: '#ff6b8b', bg: 'rgba(255, 107, 139, 0.12)', border: 'rgba(255, 107, 139, 0.25)' },
            'Va': { label: 'Viola', color: '#ff9f43', bg: 'rgba(255, 159, 67, 0.12)', border: 'rgba(255, 159, 67, 0.25)' },
            'Vc': { label: 'Cello', color: '#feca57', bg: 'rgba(254, 202, 87, 0.12)', border: 'rgba(254, 202, 87, 0.25)' },
            'Cb': { label: 'Double Bass', color: '#1dd1a1', bg: 'rgba(29, 209, 161, 0.12)', border: 'rgba(29, 209, 161, 0.25)' },
            'Fl': { label: 'Flute', color: '#48dbfb', bg: 'rgba(72, 219, 251, 0.12)', border: 'rgba(72, 219, 251, 0.25)' },
            'Ob': { label: 'Oboe', color: '#00d2d3', bg: 'rgba(0, 210, 211, 0.12)', border: 'rgba(0, 210, 211, 0.25)' },
            'Cl': { label: 'Clarinet', color: '#10ac84', bg: 'rgba(16, 172, 132, 0.12)', border: 'rgba(16, 172, 132, 0.25)' },
            'Bsn': { label: 'Bassoon', color: '#a55eea', bg: 'rgba(165, 94, 234, 0.12)', border: 'rgba(165, 94, 234, 0.25)' },
            'Hrn': { label: 'French Horn', color: '#ff781f', bg: 'rgba(255, 120, 31, 0.12)', border: 'rgba(255, 120, 31, 0.25)' },
            'Tpt': { label: 'Trumpet', color: '#ef5777', bg: 'rgba(239, 87, 119, 0.12)', border: 'rgba(239, 87, 119, 0.25)' },
        };

        const defaultMeta = { label: 'Unknown', color: '#94a3b8', bg: 'rgba(148, 163, 184, 0.1)', border: 'rgba(148, 163, 184, 0.2)' };

        // State variables
        let parsedData = [];
        let scoreHeaders = [];
        let activeFilters = {
            search: '',
            instrument: 'ALL',
            scores: new Set()
        };
        let currentLayout = 'card'; // 'card' or 'table'

        // Check state helpers (stored in localStorage and synced via WebSockets)
        let clientStates = {};
        let socket = null;
        let isConnected = false;

        function getCheckState(name, inst, piece) {
            const key = `${name}_${inst}_${piece}`;
            if (clientStates[key] !== undefined) {
                return clientStates[key];
            }
            // Fallback to localStorage if not yet loaded
            const localKey = `assign_37th_${name}_${inst}_${piece}`;
            const stored = localStorage.getItem(localKey);
            return stored ? JSON.parse(stored) : { dist: false, recv: false };
        }

        function saveCheckState(name, inst, piece, state) {
            const key = `${name}_${inst}_${piece}`;
            clientStates[key] = state;
            
            // Backup to localStorage
            const localKey = `assign_37th_${name}_${inst}_${piece}`;
            localStorage.setItem(localKey, JSON.stringify(state));
        }

        function handleCheckChange(name, inst, piece, type, checked) {
            const state = getCheckState(name, inst, piece);
            state[type] = checked;
            
            saveCheckState(name, inst, piece, state);
            updateDOMState(name, inst, piece, state);

            // Send via WebSocket to server
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'UPDATE_STATE',
                    name,
                    inst,
                    piece,
                    state
                }));
            }
        }

        function updateDOMState(name, inst, piece, state) {
            const stateClass = state.recv ? 'state-recv' : (state.dist ? 'state-dist' : 'state-none');

            // Synchronize Card View elements
            document.querySelectorAll(`.card-piece-item[data-name="${name}"][data-inst="${inst}"][data-piece="${piece}"]`).forEach(item => {
                item.className = `card-piece-item assigned ${stateClass}`;
                
                const distLabel = item.querySelector('.dist-label');
                if (distLabel) {
                    distLabel.classList.toggle('checked', state.dist);
                    distLabel.querySelector('.dist-cb').checked = state.dist;
                }
                
                const recvLabel = item.querySelector('.recv-label');
                if (recvLabel) {
                    recvLabel.classList.toggle('checked', state.recv);
                    recvLabel.querySelector('.recv-cb').checked = state.recv;
                }
            });

            // Synchronize Table View elements
            document.querySelectorAll(`.table-piece-cell[data-name="${name}"][data-inst="${inst}"][data-piece="${piece}"]`).forEach(cell => {
                cell.className = `table-piece-cell ${stateClass}`;
                
                const distLabel = cell.querySelector('.dist-label');
                if (distLabel) {
                    distLabel.classList.toggle('checked', state.dist);
                    distLabel.querySelector('.dist-cb').checked = state.dist;
                }
                
                const recvLabel = cell.querySelector('.recv-label');
                if (recvLabel) {
                    recvLabel.classList.toggle('checked', state.recv);
                    recvLabel.querySelector('.recv-cb').checked = state.recv;
                }
            });
        }

        // Personal batch checking function
        function batchCheckMember(name, inst, actionType) {
            const member = parsedData.find(item => item.name === name && item.instrument === inst);
            if (!member) return;

            let targetState = { dist: false, recv: false };
            let toastMsg = `${name}님의 체크가 해제되었습니다.`;
            if (actionType === 'dist') {
                targetState = { dist: true, recv: false };
                toastMsg = `${name}님의 모든 악보가 [분배] 완료되었습니다.`;
            } else if (actionType === 'recv') {
                targetState = { dist: true, recv: true };
                toastMsg = `${name}님의 모든 악보가 [수령] 완료되었습니다.`;
            }

            const pieceUpdates = [];

            scoreHeaders.forEach(piece => {
                if (member.pieces[piece]) {
                    saveCheckState(name, inst, piece, targetState);
                    updateDOMState(name, inst, piece, targetState);
                    pieceUpdates.push({ piece, state: targetState });
                }
            });

            // Send via WebSocket to server
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'BATCH_UPDATE',
                    name,
                    inst,
                    pieceStates: pieceUpdates
                }));
            }

            showToast(toastMsg);
        }

        // WebSocket connection manager
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host || 'localhost:3000';
            const wsUrl = `${protocol}//${host}`;

            console.log('Connecting to WebSocket:', wsUrl);
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                console.log('WebSocket connected.');
                updateConnectionStatus(true);
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'INIT') {
                        clientStates = data.states;
                        // Cache backup
                        Object.keys(clientStates).forEach(key => {
                            localStorage.setItem(`assign_37th_${key}`, JSON.stringify(clientStates[key]));
                        });
                        applyFiltersAndRender();
                    } 
                    else if (data.type === 'UPDATE_STATE') {
                        const { name, inst, piece, state } = data;
                        saveCheckState(name, inst, piece, state);
                        updateDOMState(name, inst, piece, state);
                    } 
                    else if (data.type === 'BATCH_UPDATE') {
                        const { name, inst, pieceStates } = data;
                        pieceStates.forEach(({ piece, state }) => {
                            saveCheckState(name, inst, piece, state);
                            updateDOMState(name, inst, piece, state);
                        });
                    }
                } catch (e) {
                    console.error('Failed to parse WebSocket message:', e);
                }
            };

            socket.onclose = () => {
                console.warn('WebSocket connection closed. Reconnecting in 3s...');
                updateConnectionStatus(false);
                setTimeout(connectWebSocket, 3000);
            };

            socket.onerror = (err) => {
                console.error('WebSocket error:', err);
                socket.close();
            };
        }

        function updateConnectionStatus(connected) {
            isConnected = connected;
            const logoBadge = document.querySelector('.logo-badge');
            if (logoBadge) {
                if (connected) {
                    logoBadge.textContent = '37th Concert Assignments (Online)';
                    logoBadge.style.color = '#c7d2fe';
                    logoBadge.style.borderColor = 'rgba(99, 102, 241, 0.3)';
                    logoBadge.style.background = 'linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2))';
                } else {
                    logoBadge.textContent = '37th Concert Assignments (Offline)';
                    logoBadge.style.color = '#fda4af';
                    logoBadge.style.borderColor = 'rgba(244, 63, 94, 0.3)';
                    logoBadge.style.background = 'rgba(244, 63, 94, 0.1)';
                }
            }
        }

        // DOM elements
        const listContainer = document.getElementById('list-container');
        const tableWrapper = document.getElementById('table-wrapper');
        const tableHeaderRow = document.getElementById('table-header-row');
        const tableBody = document.getElementById('table-body');
        const resultsCountSpan = document.querySelector('#results-count span');
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        const viewToggleBtn = document.getElementById('view-toggle-btn');
        const toggleBtnText = document.getElementById('toggle-btn-text');
        const instrumentTagsContainer = document.getElementById('instrument-tags-container');
        const scoreFiltersContainer = document.getElementById('score-filters-container');
        const resetFiltersBtn = document.getElementById('reset-filters');
        
        // Stats elements
        const stringsInsts = ['1Vn', '2Vn', 'Va', 'Vc', 'Cb'];
        const woodwindsInsts = ['Fl', 'Ob', 'Cl', 'Bsn'];
        const brassInsts = ['Hrn', 'Tpt'];

        // Init function
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        function initApp() {
            // Parse embedded CSV
            const csvContent = document.getElementById('csv-data').textContent;
            const parseResult = parseCSV(csvContent);
            parsedData = parseResult.data;
            scoreHeaders = parseResult.headers;

            // Sort data by Instrument Order (Strings -> Woodwinds -> Brass) then Gisu then Name
            const instOrder = [...stringsInsts, ...woodwindsInsts, ...brassInsts];
            parsedData.sort((a, b) => {
                const aIdx = instOrder.indexOf(a.instrument);
                const bIdx = instOrder.indexOf(b.instrument);
                if (aIdx !== bIdx) return (aIdx === -1 ? 99 : aIdx) - (bIdx === -1 ? 99 : bIdx);
                
                // Sort by generation (descending or ascending? Usually older generation first, e.g. 51기 before 52기)
                const aGisu = getGisuNumber(a.gisu);
                const bGisu = getGisuNumber(b.gisu);
                if (aGisu !== bGisu) return aGisu - bGisu;
                
                return a.name.localeCompare(b.name, 'ko');
            });

            // Set default layout based on screen width
            if (window.innerWidth >= 768) {
                setLayout('table');
            } else {
                setLayout('card');
            }

            // Render static filters and headers
            renderTableHeader();
            renderInstrumentFilterTags();
            renderScoreFilterChips();
            
            // Render data
            updateDashboardStats();
            applyFiltersAndRender();

            // Set up event listeners
            setupEventListeners();

            // Establish real-time connection
            connectWebSocket();
        }

        // CSV Parser (연락처 열이 제외되었으므로 slice는 4로 시작)
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length === 0) return { headers: [], data: [] };
            
            // Clean header line
            const headers = lines[0].split(',').map(h => h.trim()).filter(h => h !== '');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const row = line.split(',').map(v => v.trim());
                const item = {
                    gisu: row[0] || '',
                    name: row[1] || '',
                    instrument: row[2] || '',
                    grade: row[3] || '',
                    pieces: {}
                };

                // Pieces are from index 4 onwards matching headers
                for (let j = 4; j < headers.length; j++) {
                    const pieceName = headers[j];
                    const val = row[j] || 'FALSE';
                    item.pieces[pieceName] = val.toUpperCase() === 'TRUE';
                }
                data.push(item);
            }

            return {
                headers: headers.slice(4),
                data: data
            };
        }

        function getGisuNumber(gisuText) {
            if (gisuText === '교수님') return 0;
            if (gisuText === '선배님') return 1;
            const match = gisuText.match(/(\d+)기/);
            return match ? parseInt(match[1]) : 999;
        }

        // Helper to match instrument groups
        function getInstrumentGroup(inst) {
            if (stringsInsts.includes(inst)) return 'strings';
            if (woodwindsInsts.includes(inst)) return 'woodwinds';
            if (brassInsts.includes(inst)) return 'brass';
            return 'other';
        }

        // Render functions
        function renderTableHeader() {
            // Add piece headers to table
            scoreHeaders.forEach(piece => {
                const th = document.createElement('th');
                th.textContent = piece;
                tableHeaderRow.appendChild(th);
            });
        }

        function renderInstrumentFilterTags() {
            // Get unique instruments present in data
            const uniqueInsts = [...new Set(parsedData.map(item => item.instrument))];
            
            // Sort them by our predefined order
            const instOrder = [...stringsInsts, ...woodwindsInsts, ...brassInsts];
            uniqueInsts.sort((a, b) => instOrder.indexOf(a) - instOrder.indexOf(b));

            uniqueInsts.forEach(inst => {
                const tag = document.createElement('span');
                tag.className = 'tag-pill';
                tag.dataset.inst = inst;
                tag.textContent = inst;
                
                // Color variables for customization
                const meta = instrumentMeta[inst] || defaultMeta;
                tag.style.setProperty('--active-bg', meta.color);
                tag.style.setProperty('--active-border', meta.color);
                
                instrumentTagsContainer.appendChild(tag);
            });
        }

        function renderScoreFilterChips() {
            scoreHeaders.forEach(piece => {
                const chip = document.createElement('span');
                chip.className = 'score-filter-chip';
                chip.dataset.score = piece;
                chip.textContent = piece;
                scoreFiltersContainer.appendChild(chip);
            });
        }

        function updateDashboardStats() {
            // 1. Core Summary counts
            const total = parsedData.length;
            let strings = 0;
            let woodwinds = 0;
            let brass = 0;

            parsedData.forEach(item => {
                const grp = getInstrumentGroup(item.instrument);
                if (grp === 'strings') strings++;
                else if (grp === 'woodwinds') woodwinds++;
                else if (grp === 'brass') brass++;
            });

            document.getElementById('stat-total-players').textContent = `${total}명`;
            document.getElementById('stat-strings-players').textContent = `${strings}명`;
            document.getElementById('stat-woodwind-players').textContent = `${woodwinds}명`;
            document.getElementById('stat-brass-players').textContent = `${brass}명`;

            // 2. Score Assignment Distribution progress bars
            const piecesStatsGrid = document.getElementById('pieces-stats-grid');
            piecesStatsGrid.innerHTML = '';

            scoreHeaders.forEach(piece => {
                const assignedCount = parsedData.filter(item => item.pieces[piece]).length;
                const percentage = total > 0 ? Math.round((assignedCount / total) * 100) : 0;

                const itemDiv = document.createElement('div');
                itemDiv.className = `piece-progress-item ${activeFilters.scores.has(piece) ? 'active' : ''}`;
                itemDiv.dataset.piece = piece;
                itemDiv.innerHTML = `
                    <div class="piece-progress-header">
                        <div class="piece-progress-name" title="${piece}">${piece}</div>
                        <div class="piece-progress-count">${assignedCount}명 (${percentage}%)</div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                `;

                // Quick click on stats bar to toggle that piece filter!
                itemDiv.addEventListener('click', () => {
                    toggleScoreFilter(piece);
                });

                piecesStatsGrid.appendChild(itemDiv);
            });
        }

        function applyFiltersAndRender() {
            const filtered = parsedData.filter(item => {
                // 1. Text Search Filter (Name, Grade, Generation) - 연락처 삭제됨
                if (activeFilters.search) {
                    const query = activeFilters.search.toLowerCase();
                    const nameMatch = item.name.toLowerCase().includes(query);
                    const gisuMatch = item.gisu.toLowerCase().includes(query);
                    const gradeMatch = item.grade.toLowerCase().includes(query);
                    const instMatch = item.instrument.toLowerCase().includes(query);
                    
                    if (!nameMatch && !gisuMatch && !gradeMatch && !instMatch) {
                        return false;
                    }
                }

                // 2. Instrument Filter
                if (activeFilters.instrument !== 'ALL' && item.instrument !== activeFilters.instrument) {
                    return false;
                }

                // 3. Piece Selection Filter (Intersection: Must be playing ALL active filter pieces)
                if (activeFilters.scores.size > 0) {
                    for (let piece of activeFilters.scores) {
                        if (!item.pieces[piece]) return false;
                    }
                }

                return true;
            });

            // Update Counter
            resultsCountSpan.textContent = filtered.length;

            // Render Card Layout
            renderCards(filtered);

            // Render Table Layout
            renderTableRows(filtered);
        }

        function renderCards(data) {
            listContainer.innerHTML = '';
            
            if (data.length === 0) {
                listContainer.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--text-dim);">
                        조건에 맞는 파트원이 없습니다.
                    </div>
                `;
                return;
            }

            data.forEach(item => {
                const meta = instrumentMeta[item.instrument] || defaultMeta;
                
                const card = document.createElement('div');
                card.className = 'member-card';
                
                // Render assigned scores as badges
                let piecesHTML = '';
                scoreHeaders.forEach(piece => {
                    const isAssigned = item.pieces[piece];
                    let checkboxHTML = '';
                    let stateClass = 'unassigned';
                    let extraClass = 'state-none';
                    
                    if (isAssigned) {
                        stateClass = 'assigned';
                        const state = getCheckState(item.name, item.instrument, piece);
                        extraClass = state.recv ? 'state-recv' : (state.dist ? 'state-dist' : 'state-none');
                        
                        checkboxHTML = `
                            <div class="piece-check-group">
                                <label class="check-label dist-label ${state.dist ? 'checked' : ''}" title="분배 확인">
                                    <input type="checkbox" class="dist-cb" ${state.dist ? 'checked' : ''} onchange="handleCheckChange('${item.name}', '${item.instrument}', '${piece}', 'dist', this.checked)">
                                    <span>분배</span>
                                </label>
                                <label class="check-label recv-label ${state.recv ? 'checked' : ''}" title="수령 확인">
                                    <input type="checkbox" class="recv-cb" ${state.recv ? 'checked' : ''} onchange="handleCheckChange('${item.name}', '${item.instrument}', '${piece}', 'recv', this.checked)">
                                    <span>수령</span>
                                </label>
                            </div>
                        `;
                    }
                    
                    piecesHTML += `
                        <div class="card-piece-item ${stateClass} ${extraClass}" data-name="${item.name}" data-inst="${item.instrument}" data-piece="${piece}">
                            <span class="indicator-dot ${isAssigned ? 'active' : 'inactive'}"></span>
                            <span class="piece-name" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${piece}">${piece}</span>
                            ${checkboxHTML}
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div class="card-header-left">
                                <span class="member-name">${item.name}</span>
                                <span class="instrument-badge" style="color: ${meta.color}; background-color: ${meta.bg}; border: 1px solid ${meta.border}">${item.instrument}</span>
                            </div>
                        </div>
                        
                        <!-- Card Meta & Batch Actions Row -->
                        <div class="card-meta-row">
                            <span class="gisu-badge">${item.gisu}</span>
                            <span class="grade-text">${item.grade || '&nbsp;'}</span>
                            <div class="batch-actions">
                                <button class="batch-btn dist" onclick="batchCheckMember('${item.name}', '${item.instrument}', 'dist')" title="전체 분배">일괄 분배</button>
                                <button class="batch-btn recv" onclick="batchCheckMember('${item.name}', '${item.instrument}', 'recv')" title="전체 수령">일괄 수령</button>
                                <button class="batch-btn reset" onclick="batchCheckMember('${item.name}', '${item.instrument}', 'reset')" title="전체 초기화">해제</button>
                            </div>
                        </div>
                    </div>

                    <div class="card-pieces">
                        ${piecesHTML}
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function renderTableRows(data) {
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                const colSpan = 5 + scoreHeaders.length;
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="${colSpan}" style="text-align: center; padding: 3rem 1rem; color: var(--text-dim);">
                            조건에 맞는 파트원이 없습니다.
                        </td>
                    </tr>
                `;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                const meta = instrumentMeta[item.instrument] || defaultMeta;

                // Basic details + 일괄 처리 열 (연락처 열 대신 추가)
                tr.innerHTML = `
                    <td class="sticky-name" style="font-weight: 700;">${item.name}</td>
                    <td class="sticky-inst">
                        <span class="instrument-badge" style="color: ${meta.color}; background-color: ${meta.bg}; border: 1px solid ${meta.border}">${item.instrument}</span>
                    </td>
                    <td>${item.gisu}</td>
                    <td>${item.grade}</td>
                    <td>
                        <div class="table-batch-actions">
                            <button class="batch-btn dist" onclick="batchCheckMember('${item.name}', '${item.instrument}', 'dist')" title="전체 분배">분</button>
                            <button class="batch-btn recv" onclick="batchCheckMember('${item.name}', '${item.instrument}', 'recv')" title="전체 수령">수</button>
                            <button class="batch-btn reset" onclick="batchCheckMember('${item.name}', '${item.instrument}', 'reset')" title="전체 해제">✕</button>
                        </div>
                    </td>
                `;

                // Pieces column
                scoreHeaders.forEach(piece => {
                    const td = document.createElement('td');
                    if (item.pieces[piece]) {
                        const state = getCheckState(item.name, item.instrument, piece);
                        const stateClass = state.recv ? 'state-recv' : (state.dist ? 'state-dist' : 'state-none');
                        
                        td.className = `table-piece-cell ${stateClass}`;
                        td.dataset.name = item.name;
                        td.dataset.inst = item.instrument;
                        td.dataset.piece = piece;
                        
                        td.innerHTML = `
                            <div class="table-cell-check">
                                <label class="check-label dist-label ${state.dist ? 'checked' : ''}" title="분배 확인">
                                    <input type="checkbox" class="dist-cb" ${state.dist ? 'checked' : ''} onchange="handleCheckChange('${item.name}', '${item.instrument}', '${piece}', 'dist', this.checked)">
                                    <span>분</span>
                                </label>
                                <label class="check-label recv-label ${state.recv ? 'checked' : ''}" title="수령 확인">
                                    <input type="checkbox" class="recv-cb" ${state.recv ? 'checked' : ''} onchange="handleCheckChange('${item.name}', '${item.instrument}', '${piece}', 'recv', this.checked)">
                                    <span>수</span>
                                </label>
                            </div>
                        `;
                    } else {
                        td.className = 'table-unassigned';
                        td.textContent = '·';
                    }
                    tr.appendChild(td);
                });

                tableBody.appendChild(tr);
            });
        }

        // Action controllers
        function setLayout(layout) {
            currentLayout = layout;
            if (layout === 'card') {
                document.body.classList.remove('layout-table');
                document.body.classList.add('layout-card');
                toggleBtnText.textContent = '목록 보기';
                viewToggleBtn.innerHTML = `
                    <svg class="icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                    <span>목록 보기</span>
                `;
            } else {
                document.body.classList.remove('layout-card');
                document.body.classList.add('layout-table');
                viewToggleBtn.innerHTML = `
                    <svg class="icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>카드 보기</span>
                `;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function toggleScoreFilter(piece) {
            if (activeFilters.scores.has(piece)) {
                activeFilters.scores.delete(piece);
            } else {
                activeFilters.scores.add(piece);
            }

            // Sync visual states of chips
            const chips = scoreFiltersContainer.querySelectorAll('.score-filter-chip');
            chips.forEach(chip => {
                const isSelected = activeFilters.scores.has(chip.dataset.score);
                chip.classList.toggle('active', isSelected);
            });

            // Re-render
            updateDashboardStats();
            applyFiltersAndRender();
        }

        function resetAllFilters() {
            activeFilters.search = '';
            activeFilters.instrument = 'ALL';
            activeFilters.scores.clear();

            // Reset Search bar UI
            searchInput.value = '';
            clearBtn.style.display = 'none';

            // Reset Instrument tags UI
            const instPills = instrumentTagsContainer.querySelectorAll('.tag-pill');
            instPills.forEach(pill => {
                pill.classList.toggle('active', pill.dataset.inst === 'ALL');
            });

            // Reset Score chips UI
            const scoreChips = scoreFiltersContainer.querySelectorAll('.score-filter-chip');
            scoreChips.forEach(chip => {
                chip.classList.remove('active');
            });

            // Re-render
            updateDashboardStats();
            applyFiltersAndRender();
        }

        function setupEventListeners() {
            // Search Input listener
            searchInput.addEventListener('input', (e) => {
                activeFilters.search = e.target.value.trim();
                clearBtn.style.display = activeFilters.search ? 'block' : 'none';
                applyFiltersAndRender();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                activeFilters.search = '';
                clearBtn.style.display = 'none';
                applyFiltersAndRender();
                searchInput.focus();
            });

            // Instrument Tags listener
            instrumentTagsContainer.addEventListener('click', (e) => {
                const tag = e.target.closest('.tag-pill');
                if (!tag) return;

                const selectedInst = tag.dataset.inst;
                activeFilters.instrument = selectedInst;

                // Update active classes
                const pills = instrumentTagsContainer.querySelectorAll('.tag-pill');
                pills.forEach(pill => {
                    pill.classList.toggle('active', pill.dataset.inst === selectedInst);
                });

                applyFiltersAndRender();
            });

            // Score Chips listener
            scoreFiltersContainer.addEventListener('click', (e) => {
                const chip = e.target.closest('.score-filter-chip');
                if (!chip) return;

                const piece = chip.dataset.score;
                toggleScoreFilter(piece);
            });

            // View Toggle Button listener
            viewToggleBtn.addEventListener('click', () => {
                if (currentLayout === 'card') {
                    setLayout('table');
                } else {
                    setLayout('card');
                }
            });

            // Reset filter link listener
            resetFiltersBtn.addEventListener('click', () => {
                resetAllFilters();
            });

            // Collapsible stats toggle
            const statsToggleBtn = document.getElementById('stats-toggle-btn');
            const statsContainer = document.querySelector('.stats-container');
            statsToggleBtn.addEventListener('click', () => {
                const isExpanded = statsContainer.classList.toggle('expanded');
                statsToggleBtn.classList.toggle('active', isExpanded);
                statsToggleBtn.querySelector('span').textContent = isExpanded ? '통계 대시보드 접기' : '통계 대시보드 보기';
            });
        }
    </script>
</body>
</html>
